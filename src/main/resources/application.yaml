server:
  port: 8088

app:
  jwt:
    secret: ${JWT_SECRET:change-me-dev-only-min-32-bytes-long-secret}
    expires-in: 3600
    issuer: tomato-banking

spring:
  datasource:
    url: jdbc:h2:mem:tomatodb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
